<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeonRail Lite - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400&amp;family=JetBrains+Mono:wght@500;700&amp;family=Sora:wght@600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#34fc0d",
                      "on-surface": "#e5e1e4",
                      "surface-tint": "#00dbe7",
                      "tertiary-fixed-dim": "#2ae500",
                      "surface-container": "#201f21",
                      "on-secondary": "#66002c",
                      "on-primary": "#00363a",
                      "on-primary-fixed-variant": "#004f54",
                      "on-surface-variant": "#b9cacb",
                      "on-tertiary": "#053900",
                      "on-error-container": "#ffdad6",
                      "primary-fixed": "#74f5ff",
                      "surface-bright": "#39393b",
                      "surface-dim": "#131315",
                      "inverse-primary": "#00696f",
                      "surface-container-lowest": "#0e0e10",
                      "primary-container": "#00f2ff",
                      "surface-container-high": "#2a2a2c",
                      "inverse-on-surface": "#313032",
                      "surface-container-low": "#1c1b1d",
                      "secondary-container": "#ff4b89",
                      "tertiary-fixed": "#79ff5b",
                      "on-secondary-container": "#590026",
                      "on-error": "#690005",
                      "error-container": "#93000a",
                      "secondary-fixed-dim": "#ffb1c3",
                      "on-primary-container": "#006a71",
                      "inverse-surface": "#e5e1e4",
                      "on-secondary-fixed": "#3f0019",
                      "surface": "#131315",
                      "secondary-fixed": "#ffd9e0",
                      "on-tertiary-fixed-variant": "#095300",
                      "outline": "#849495",
                      "surface-container-highest": "#353437",
                      "primary-fixed-dim": "#00dbe7",
                      "on-primary-fixed": "#002022",
                      "on-secondary-fixed-variant": "#8f0041",
                      "on-tertiary-fixed": "#022100",
                      "tertiary": "#e4ffd6",
                      "on-background": "#e5e1e4",
                      "secondary": "#ffb1c3",
                      "background": "#131315",
                      "on-tertiary-container": "#106f00",
                      "outline-variant": "#3a494b",
                      "error": "#ffb4ab",
                      "surface-variant": "#353437",
                      "primary": "#e1fdff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "panel-gap": "8px",
                      "margin-mobile": "16px",
                      "margin-desktop": "32px",
                      "unit": "4px"
              },
              "fontFamily": {
                      "body-rt": [
                              "Hanken Grotesk"
                      ],
                      "label-sm": [
                              "JetBrains Mono"
                      ],
                      "display-lg": [
                              "Sora"
                      ],
                      "display-mobile": [
                              "Sora"
                      ],
                      "headline-md": [
                              "Sora"
                      ],
                      "data-lg": [
                              "JetBrains Mono"
                      ]
              },
              "fontSize": {
                      "body-rt": [
                              "16px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-sm": [
                              "12px",
                              {
                                      "lineHeight": "1",
                                      "letterSpacing": "0.1em",
                                      "fontWeight": "500"
                              }
                      ],
                      "display-lg": [
                              "48px",
                              {
                                      "lineHeight": "1.1",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "800"
                              }
                      ],
                      "display-mobile": [
                              "32px",
                              {
                                      "lineHeight": "1.1",
                                      "fontWeight": "800"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "1.2",
                                      "fontWeight": "600"
                              }
                      ],
                      "data-lg": [
                              "20px",
                              {
                                      "lineHeight": "1",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ]
              }
            }
          }
        }
    </script>
<style>/* Atmosphere & Motion Effects */
@keyframes scroll-city {
    0% {
        background-position: 0 0;
        } 100% {
        background-position: -200vw 0;
        }
    }
@keyframes scroll-grid {
    0% {
        background-position: 0 0;
        } 100% {
        background-position: -100px 0;
        }
    }
@keyframes rail-glow {
    0%, 100% {
        box-shadow: 0 0 10px rgba(0, 219, 231, 0.4), inset 0 0 5px rgba(0, 219, 231, 0.2);
        } 50% {
        box-shadow: 0 0 20px rgba(0, 219, 231, 0.8), inset 0 0 10px rgba(0, 219, 231, 0.5);
        }
    }
@keyframes entity-approach {
    0% {
        transform: translateX(100vw) scale(0.8);
        opacity: 0;
        } 10% {
        opacity: 1;
        } 100% {
        transform: translateX(-20vw) scale(1.2);
        opacity: 1;
        }
    }
@keyframes vehicle-hover {
    0%, 100% {
        transform: translateY(0);
        } 50% {
        transform: translateY(-4px);
        }
    }
@keyframes particle-flicker {
    0%, 100% {
        opacity: 1;
        transform: scale(1);
        } 50% {
        opacity: 0.5;
        transform: scale(0.8);
        }
    }
.cityscape-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBW6IkOlv8kzoqhTt36pjPIysUxfbf1V1EeWaoYlkOJaHITfKQiTdBsmRCxJb8wBGI7q9z7tODZUA4Zz2aYdOFirePCAwBy7YHLFC6lWlyl7bWNGtc4dYboqtnmvpJr5SvO8PZLrq97PRNMT4oo_9IeHxbx4HHDLEFnvb3ktEI2SXYwGWQ5FcRgDikWnp6rWBbZpzyZ8VxLS4rUc4XoxP0TOudoyO1EoeEbGqL-pM-P0U_4Y-lqY890hfFGeO-ErVvo_9olbo-cJtR-);
    background-size: cover;
    background-repeat: repeat-x;
    animation: scroll-city 120s linear infinite
    }
.cyber-grid {
    background-image: linear-gradient(to right, rgba(0, 219, 231, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 219, 231, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: scroll-grid 2s linear infinite
    }
.neon-glow-primary {
    filter: drop-shadow(0 0 8px rgba(0, 219, 231, 0.8))
    }
.neon-glow-secondary {
    filter: drop-shadow(0 0 12px rgba(255, 75, 137, 0.9))
    }
.neon-glow-tertiary {
    filter: drop-shadow(0 0 10px rgba(52, 252, 13, 0.8))
    }
.scanline::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 100;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none
    }</style>
</head>
<body class="bg-background text-on-background overflow-hidden font-body-rt h-screen w-screen relative scanline selection:bg-primary-fixed/30">
<!-- GAMEPLAY CANVAS LAYER (Z-10) -->
<div class="absolute inset-0 z-10 cityscape-bg" data-alt="A sprawling, dark cyberpunk cityscape at night, viewed from a high vantage point as if flying past it. The architecture is dense, brutalist, and futuristic, silhouetted against a pitch-black sky. Faint, glowing cyan and magenta lights emanate from distant windows and towering holographic billboards, casting a moody, high-contrast glow over the urban canyon. The atmosphere is tense, fast-paced, and cinematic, establishing a light-as-material neon aesthetic.">
<!-- Floor Grid Overlay -->
<div class="absolute bottom-0 w-full h-[60%] cyber-grid perspective-[1000px]" style="transform: rotateX(60deg) scale(2); transform-origin: bottom;"></div>
<!-- Rail System (3 Distinct Lanes) -->
<div class="absolute inset-y-0 w-full flex flex-col justify-center items-center gap-16 md:gap-24">
<!-- Lane 1 (Top) -->
<div class="w-full h-1 bg-primary-fixed/20 relative" style="animation: rail-glow 2s infinite ease-in-out;">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-primary-fixed/50"></div>
<!-- Collectible (Energy Shard) -->
<div class="absolute top-1/2 -translate-y-1/2 right-0 neon-glow-tertiary" style="animation: entity-approach 4s linear infinite 1.5s;">
<div class="w-6 h-6 border-2 border-tertiary-container rotate-45 flex items-center justify-center bg-tertiary-container/20 backdrop-blur-sm">
<div class="w-2 h-2 bg-tertiary-container rounded-full" style="animation: particle-flicker 0.1s infinite;"></div>
</div>
</div>
</div>
<!-- Lane 2 (Middle) - Player Lane -->
<div class="w-full h-1 bg-primary-fixed/40 relative shadow-[0_0_15px_rgba(0,219,231,0.5)]">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-primary-fixed drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]"></div>
<!-- Player Vehicle -->
<div class="absolute left-[15%] top-1/2 -translate-y-1/2 z-30 neon-glow-primary" style="animation: vehicle-hover 0.5s ease-in-out infinite;">
<!-- Engine Trail -->
<div class="absolute -left-12 top-1/2 -translate-y-1/2 w-16 h-1 bg-gradient-to-r from-transparent to-primary-fixed opacity-80 blur-sm"></div>
<div class="absolute -left-20 top-1/2 -translate-y-1/2 w-24 h-[2px] bg-gradient-to-r from-transparent to-white opacity-60"></div>
<!-- Vehicle Core -->
<div class="w-12 h-4 border border-primary-fixed bg-surface-container/80 backdrop-blur-md relative overflow-hidden flex items-center">
<div class="w-full h-[1px] bg-primary-fixed absolute top-1/2 -translate-y-1/2"></div>
<div class="h-full w-2 bg-primary-fixed absolute right-0"></div>
</div>
</div>
<!-- Obstacle (Neon Barrier) -->
<div class="absolute top-1/2 -translate-y-1/2 right-0 neon-glow-secondary z-20" style="animation: entity-approach 3s linear infinite;">
<div class="w-4 h-16 bg-surface-container/50 border-2 border-secondary-container backdrop-blur-xl relative flex justify-center overflow-hidden">
<!-- Warning stripes -->
<div class="absolute inset-0 bg-[repeating-linear-gradient(45deg,transparent,transparent_4px,rgba(255,75,137,0.3)_4px,rgba(255,75,137,0.3)_8px)]"></div>
<div class="h-full w-[2px] bg-secondary-container animate-pulse"></div>
</div>
</div>
</div>
<!-- Lane 3 (Bottom) -->
<div class="w-full h-1 bg-primary-fixed/20 relative" style="animation: rail-glow 2s infinite ease-in-out 1s;">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-primary-fixed/50"></div>
</div>
</div>
<!-- Speed Lines Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background: repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(255,255,255,0.1) 100px, rgba(255,255,255,0.1) 102px); animation: scroll-grid 0.5s linear infinite;"></div>
</div>
<!-- HUD LAYER (Z-50) -->
<div class="absolute inset-0 pointer-events-none z-50 flex flex-col justify-between">
<!-- TopAppBar (From JSON, adapted as HUD Header) -->
<nav class="fixed top-0 w-full bg-transparent text-primary dark:text-primary-fixed font-headline-md text-headline-md tracking-tighter bg-gradient-to-b from-surface-dim to-transparent flat no shadows transition-all duration-150 active:scale-95 flex justify-between items-center px-margin-mobile py-panel-gap z-50 pointer-events-auto">
<!-- Brand / Anchor -->
<div class="font-display-lg text-display-mobile text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(0,219,231,0.8)]">NEONRAIL LITE</div>
<!-- Trailing Icons -->
<div class="flex items-center gap-4">
<button aria-label="Pause" class="material-symbols-outlined hover:text-primary hover:drop-shadow-[0_0_10px_rgba(225,253,255,1)] transition-all" style="font-variation-settings: 'FILL' 0;">
                    pause
                </button>
<button aria-label="Energy Settings" class="material-symbols-outlined hover:text-primary hover:drop-shadow-[0_0_10px_rgba(225,253,255,1)] transition-all" style="font-variation-settings: 'FILL' 0;">
                    bolt
                </button>
</div>
</nav>
<!-- Secondary HUD Data (Score, Level, Energy) -->
<div class="absolute top-[80px] left-margin-mobile flex flex-col gap-unit pointer-events-auto">
<!-- Score -->
<div class="font-data-lg text-data-lg text-primary-fixed drop-shadow-[0_0_5px_rgba(0,219,231,0.5)]">
                SCORE: 12,450
            </div>
<div class="flex items-center gap-panel-gap mt-2">
<!-- Level Chip -->
<div class="bg-primary-fixed text-[#000000] font-label-sm text-label-sm px-2 py-1 rounded-sm uppercase shadow-[0_0_10px_rgba(0,219,231,0.4)]">
                    LEVEL: 03
                </div>
<!-- Energy Progress Bar -->
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm text-tertiary-container uppercase drop-shadow-[0_0_5px_rgba(52,252,13,0.5)]">Energy</span>
<div class="w-32 md:w-48 h-[2px] bg-tertiary-container/10 relative mt-[1px]">
<div class="absolute left-0 top-0 h-full w-[75%] bg-gradient-to-r from-transparent to-tertiary-container"></div>
<div class="absolute left-[75%] top-1/2 -translate-y-1/2 w-[6px] h-[6px] bg-white rounded-full shadow-[0_0_8px_rgba(52,252,13,1)]"></div>
</div>
</div>
</div>
</div>
</div>
</body></html>
